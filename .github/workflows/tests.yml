name: Run Tests

on:
  push:
    branches:
      - "main"
  workflow_dispatch:
  pull_request:
    branches:
      - "main"

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.3.0"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
