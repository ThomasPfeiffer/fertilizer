<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="158 -55 92 106">
  <style>.st0{fill:#D6EE00;}</style>

  <!-- Fertilizer bag (tilted ~55° CCW, pouring lower-left onto the leaf) -->
  <g transform="translate(230, -38) rotate(-55)">
    <!-- Top fold (crimped bag top) -->
    <path d="M-5,-8 L-3.5,-14 L3.5,-14 L5,-8 Z" fill="#1a1a1a"/>
    <!-- Fold crease lines -->
    <line x1="-1.5" y1="-14" x2="-1.5" y2="-8" stroke="#3d3d20" stroke-width="0.5"/>
    <line x1=" 1.5" y1="-14" x2=" 1.5" y2="-8" stroke="#3d3d20" stroke-width="0.5"/>
    <!-- Bag body -->
    <rect x="-5" y="-8" width="10" height="16" rx="1.5" fill="#1a1a1a"/>
    <!-- Yellow label stripe -->
    <rect x="-5" y="-3" width="10" height="4.5" fill="#D6EE00"/>
    <!-- Bag outline (subtle texture) -->
    <rect x="-5" y="-8" width="10" height="16" rx="1.5" fill="none" stroke="#3d3d20" stroke-width="0.6"/>
    <!-- Pour opening (torn/cut corner at bottom) -->
    <path d="M-2.5,8 L-4,12 L4,12 L2.5,8 Z" fill="#0d0d05"/>
    <line x1="-4" y1="12" x2="4" y2="12" stroke="#3d3d20" stroke-width="0.5"/>
  </g>

  <!-- Granules between bag opening and main field (pour trajectory) -->
  <circle cx="238" cy="-30" r="1.6" fill="#D6EE00"/>
  <circle cx="235" cy="-26" r="1.4" fill="#D6EE00"/>

  <!-- Fertilizer granules on the leaf -->
  <circle cx="176" cy="-21" r="2"   fill="#D6EE00"/>
  <circle cx="189" cy="-25" r="2.4" fill="#D6EE00"/>
  <circle cx="202" cy="-22" r="2"   fill="#D6EE00"/>
  <circle cx="216" cy="-24" r="2.2" fill="#D6EE00"/>
  <circle cx="229" cy="-19" r="1.8" fill="#D6EE00"/>
  <circle cx="237" cy="-23" r="1.5" fill="#D6EE00"/>

  <circle cx="183" cy="-13" r="1.4" fill="#D6EE00"/>
  <circle cx="196" cy="-15" r="1.6" fill="#D6EE00"/>
  <circle cx="210" cy="-12" r="1.4" fill="#D6EE00"/>
  <circle cx="223" cy="-14" r="1.5" fill="#D6EE00"/>

